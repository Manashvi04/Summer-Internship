    <!-- Fucntion is passed to method -->
    <script>
        $(document).ready(function(){
            $("p").click(function(){
                $(this).fadeOut();
            });
        });
    </script>

    <style>
        p {
            display: block;
            width: 300px;
            padding: 20px;
            font-size: 30px;
            border: 2px solid green;
        }
    </style>
</head>
