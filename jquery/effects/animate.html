<script>
    $(document).ready(function(){
        $("#b1").click(function(){
            $("#div").animate({
                height:"200px",
                width:"200px"
            },{
                duration:1000,
                easing:"linear",
                complete:function(){
                    $(this).after("<p> Reached maximum height and width</p>");
                }
            });
        });
    });
</script>
<style>
    div{
        width: 100px;
        height:100px;
        background-color: green;
        margin-top: 10px;
    }

    #b1{
        margin-top: 10px;
    }
</style>
<body>
    <div id="div"></div>
    <button id="b1">Click Here</button>
</body>
</html>
