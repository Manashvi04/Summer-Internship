<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .form1 {
            width: 40%;
            border: 2px solid black;
            padding: 15px;
            background-color: rgb(179, 240, 251);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 5px;
            margin: 5px 0 10px 0;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 8px;
            background: white;
            border: 1px solid black;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background: lightgray;
        }

        #popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff4d4d;
            color: white;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            display: none;
            z-index: 1000;
        }

        #popup.show {
            display:block;
        }
    </style>
</head>
<body>
    <div class="form1">
        <form action="register.php" method="post" enctype="multipart/form-data">
            <h1>STUDENT REGISTRATION FORM</h1>
            
            <label for="rno">Roll no:</label>
            <input type="text" name="roll_no" id="rno" >
            <br>
            <br>

            <label for="sname">Student Name:</label>
            <input type="text" name="first_name" id="sname" placeholder="First Name" >
            <span>-</span>
            <input type="text" name="last_name" id="sname" placeholder="Last Name" >
            <br>
            <br>

            <label for="fname">Father's Name:</label>
            <input type="text" name="father_name" id="fname" >
            <br>
            <br>

            <label for="dob">Date of Birth:</label>
            <input type="date" name="dob" id="dob" >
            <br>
            <br>

            <label for="contact">Contact No:</label>
            <input type="tel" name="contact_no" >
            <br>
            <br>

            <label for="email">Email:</label>
            <input type="text" name="email" id="email" >
            <br>
            <br>

            <label for="password">Password:</label>
            <input type="password" name="password" id="password" >
            <br>
            <br>

            <label for="gender">Gender:</label>
            <input type="radio" name="gender" value="Male" >Male
            <input type="radio" name="gender" value="Female" >Female
            <br>
            <br>

            <label for="dept">Department:</label>
            <input type="checkbox" name="dept[]" value="CSE">CSE
            <input type="checkbox" name="dept[]" value="CE" >CE
            <input type="checkbox" name="dept[]" value="IT" >IT
            <input type="checkbox" name="dept[]" value="EC" >EC
            <input type="checkbox" name="dept[]" value="Civil" >Civil
            <input type="checkbox" name="dept[]" value="Mechanical" >Mechanical
            <br>
            <br>

            <label for="course">Course:</label>
            <select name="course" id="course" >
                <option value="ai">AI</option>
                <option value="data science">Data Science</option>
                <option value="cloud">Cloud Computing</option>
                <option value="dmarketing">Digital Marketing</option>
                <option value="ecommerce">E-commerce</option>
            </select>
            <br>
            <br>

            <label for="img">Student photo:</label>
            <input type="file" name="photo" id="img">
            <br>
            <br>

            <label for="city">City:</label>
            <input type="text" name="city" id="city">
            <br>
            <br>

            <label for="add">Address:</label>
            <br>
            <textarea name="add1" id="add1" cols="50" rows="15"></textarea>
            <br>
            <br>
            
            <input type="submit" value="Register">
        </form>
    </div>
    <script src="form.js"></script>
    <div id="popup"></div>
</body>
</html>
